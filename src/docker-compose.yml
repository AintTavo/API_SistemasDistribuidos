# ══════════════════════════════════════════════════════════════════
#  PaTavo — Monolito (API + PWA)
#  Front (Nginx) → app (Express/Socket.IO) → Postgres
#  Credenciales y puertos vía .env (ver .env.example).
#  nginx espera a que "app" esté sano (condition: service_healthy)
#  para evitar 502 durante el arranque.
# ══════════════════════════════════════════════════════════════════

# Nombre de proyecto explícito (evita colisión con otras carpetas "src").
name: patavo-api

services:
  # ── Base de datos ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-patavo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-patavo}
      POSTGRES_DB: ${POSTGRES_DB:-patavo}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-patavo}"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - patavo_db:/var/lib/postgresql/data

  # ── Monolito Node (API + Socket.IO) — interno ──────────────────
  app:
    build: ./backend
    restart: unless-stopped
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-patavo}
      PGPASSWORD: ${POSTGRES_PASSWORD:-patavo}
      PGDATABASE: ${POSTGRES_DB:-patavo}
      JWT_SECRET: ${JWT_SECRET:-patavo-monolith-secret}
      PORT: 3000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    depends_on:
      db:
        condition: service_healthy

  # ── Nginx: sirve el front (backend/public) y proxya la API ─────
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      app:
        condition: service_healthy

volumes:
  patavo_db:
